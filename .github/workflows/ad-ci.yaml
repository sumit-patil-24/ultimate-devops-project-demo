# CI for AD Service
name: AD-ci

on:
  push:
    branches:
      - main
    paths:
      - 'src/ad/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17' # Adjust to your Java version (e.g., 11, 17, 21)
        distribution: 'temurin'
        cache: 'gradle'

    - name: Build with Gradle
      run: ./gradlew build

    - name: Run unit tests
      run: ./gradlew test
      
  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Docker
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Docker Push
      uses: docker/build-push-action@v6
      with:
        context: src/ad
        file: src/ad/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ad:${{ github.run_id }}

  updatek8s:
    runs-on: ubuntu-latest
    needs: docker

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.TOKEN }}

    - name: Update tag in kubernetes deployment manifest
      run: | 
        sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/ad:${{ github.run_id }}|" kubernetes/ad/deploy.yaml
    
    - name: Commit and push changes
      run: |
        git config --global user.email "sumit@gmail.com"
        git config --global user.name "Sumit Patil"
        git add kubernetes/ad/deploy.yaml
        git commit -m "[CI]: Update ad image tag"
        git push origin HEAD:main

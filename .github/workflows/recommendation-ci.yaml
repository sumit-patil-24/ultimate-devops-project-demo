# CI for recommendation Service
name: recommendation-ci

on:
  push:
    branches:
      - main
    paths:
      - 'src/recommendation/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Automatically caches your dependencies for faster runs

    - name: Install dependencies
      run: |
        cd src/recommendation
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

  code-quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Run Linter (Flake8)
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 src/recommendation --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 src/recommendation --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Docker
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Docker Push
      uses: docker/build-push-action@v6
      with:
        context: src/recommendation
        file: src/recommendation/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/recommendation:${{ github.run_id }}

  updatek8s:
    runs-on: ubuntu-latest
    needs: docker

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.TOKEN }}

    - name: Update tag in kubernetes deployment manifest
      run: | 
        # 1. Update individual service manifest safely
        sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/recommendation:${{ github.run_id }}|" kubernetes/recommendation/deploy.yaml

        # 2. Update shared manifest by targeting the unique default suffix pattern.
        # This regex matches the 'image:' line and anything ending with '-recommendationservice' (with or without quotes).
        sed -i "s|image: .*recommendationservice.*|image: '${{ secrets.DOCKER_USERNAME }}/recommendation:${{ github.run_id }}'|" kubernetes/complete-deploy.yaml

    - name: Commit and push changes
      run: |
        git config --global user.email "sumit@gmail.com"
        git config --global user.name "Sumit Patil"
        git add kubernetes/recommendation/deploy.yaml kubernetes/complete-deploy.yaml
        git commit -m "[CI]: Update recommendation image tag"
        git push origin HEAD:main
